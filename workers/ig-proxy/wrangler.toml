name = "ig-proxy"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Secrets (set these with `wrangler secret put`):
#   IG_USER_ID_UNDERWATER
#   IG_ACCESS_TOKEN_UNDERWATER
#   IG_USER_ID_PORTRAITS
#   IG_ACCESS_TOKEN_PORTRAITS
# Optional:
#   ALLOWED_ORIGIN  (defaults to "*"; lock to your domain in prod)
#
# Example:
#   wrangler secret put IG_USER_ID_UNDERWATER
#   wrangler secret put IG_ACCESS_TOKEN_UNDERWATER
#   wrangler secret put IG_USER_ID_PORTRAITS
#   wrangler secret put IG_ACCESS_TOKEN_PORTRAITS
#
# Then: wrangler deploy
