name = "ig-proxy"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Secrets (set these with `wrangler secret put`):
#   IG_USER_ID_UNDERWATER
#   IG_ACCESS_TOKEN_UNDERWATER
#   IG_USER_ID_PORTRAITS
#   IG_ACCESS_TOKEN_PORTRAITS
#
# Example:
#   wrangler secret put IG_USER_ID_UNDERWATER
#   wrangler secret put IG_ACCESS_TOKEN_UNDERWATER
#   wrangler secret put IG_USER_ID_PORTRAITS
#   wrangler secret put IG_ACCESS_TOKEN_PORTRAITS
#
# Then: wrangler deploy

# Production environment — locks CORS to the real site origin so the
# proxy can't be abused from arbitrary origins (which would burn the
# IG rate limit). Override locally with:
#   wrangler dev --var ALLOWED_ORIGIN:http://localhost:3000
[env.production]
vars = { ALLOWED_ORIGIN = "https://tinglingdingphotography.com" }
